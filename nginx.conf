server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve files directly if they exist, otherwise fall back to index.html
    # (needed if you ever add client-side routing with react-router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic gzip for the production build assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}